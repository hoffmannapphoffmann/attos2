<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATTOS2 — Painel Administrativo</title>
<meta name="description" content="Painel administrativo ATTOS2.">
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<link rel="icon" type="image/png" href="../../logo2.png">
<link rel="shortcut icon" href="../../logo2.png">
<script src="../../js/audit.js"></script>
<style>
:root {
  --gold: #D4AF37;
  --gold2: #FFD700;
  --bg: #0a0a0a;
  --bg2: #111;
  --card: #1a1a1a;
  --border: rgba(212,175,55,0.15);
  --text: rgba(255,255,255,0.85);
  --text2: rgba(255,255,255,0.5);
  --success: #4CAF50;
  --warning: #FF9800;
  --info: #2196F3;
  --danger: #f44336;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: Arial, sans-serif;
  min-height: 100vh;
}

/* LOGIN SCREEN */
.login-screen {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 20px;
}
.login-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 40px;
  width: 100%;
  max-width: 400px;
  text-align: center;
}
.login-card .logo { height: 60px; margin-bottom: 16px; opacity: 0.9; }
.login-card h1 { font-size: 1.1rem; letter-spacing: 3px; font-weight: 400; margin-bottom: 4px; }
.login-card h1 em { color: var(--gold); font-style: italic; }
.login-card p { font-size: 0.7rem; color: var(--text2); letter-spacing: 1px; margin-bottom: 24px; }
.login-card input {
  width: 100%;
  padding: 12px 16px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: #fff;
  font-size: 0.85rem;
  outline: none;
  margin-bottom: 12px;
  font-family: Arial, sans-serif;
}
.login-card input:focus { border-color: var(--gold); }
.login-card .btn {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, var(--gold), var(--gold2));
  border: none;
  border-radius: 8px;
  color: #050505;
  font-size: 0.75rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s;
  font-family: Arial, sans-serif;
}
.login-card .btn:hover { box-shadow: 0 0 30px rgba(212,175,55,0.3); }
.login-card .erro { color: var(--danger); font-size: 0.75rem; margin-top: 8px; }

/* LAYOUT ADMIN */
.admin-layout { display: none; min-height: 100vh; }
.admin-sidebar {
  position: fixed;
  left: 0; top: 0; bottom: 0;
  width: 220px;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  padding: 24px 16px;
  display: flex;
  flex-direction: column;
  z-index: 10;
}
.admin-sidebar .logo-sm { height: 28px; margin-bottom: 24px; opacity: 0.8; }
.admin-sidebar nav { flex: 1; display: flex; flex-direction: column; gap: 4px; }
.admin-sidebar a {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-radius: 8px;
  color: var(--text2);
  text-decoration: none;
  font-size: 0.75rem;
  letter-spacing: 1px;
  transition: all 0.2s;
}
.admin-sidebar a:hover, .admin-sidebar a.active {
  background: rgba(212,175,55,0.08);
  color: var(--gold);
}
.admin-sidebar .sair {
  margin-top: auto;
  color: var(--text2);
  cursor: pointer;
  padding: 10px 12px;
  border-radius: 8px;
  font-size: 0.75rem;
  letter-spacing: 1px;
  display: flex;
  align-items: center;
  gap: 10px;
  transition: all 0.2s;
  border: none;
  background: none;
  font-family: Arial, sans-serif;
  width: 100%;
}
.admin-sidebar .sair:hover { background: rgba(244,67,54,0.1); color: var(--danger); }

.admin-main {
  margin-left: 220px;
  padding: 32px;
  min-height: 100vh;
}
.admin-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 32px;
  flex-wrap: wrap;
  gap: 12px;
}
.admin-header h1 {
  font-size: 1.3rem;
  letter-spacing: 3px;
  font-weight: 400;
}
.admin-header h1 em { color: var(--gold); font-style: italic; }
.admin-header .user-info {
  font-size: 0.7rem;
  color: var(--text2);
  letter-spacing: 1px;
}

/* CARDS DASHBOARD */
.dashboard-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 16px;
  margin-bottom: 32px;
}
.dash-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
}
.dash-card .dash-num {
  font-size: 1.8rem;
  font-weight: 700;
  color: var(--gold);
  margin-bottom: 4px;
}
.dash-card .dash-label {
  font-size: 0.65rem;
  color: var(--text2);
  letter-spacing: 2px;
  text-transform: uppercase;
}
.dash-card .dash-icon {
  font-size: 1.5rem;
  opacity: 0.3;
  margin-bottom: 8px;
}

/* TABELA */
.admin-table-wrap {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
}
.admin-table {
  width: 100%;
  border-collapse: collapse;
}
.admin-table th {
  text-align: left;
  padding: 14px 16px;
  font-size: 0.6rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text2);
  border-bottom: 1px solid var(--border);
  font-weight: 400;
}
.admin-table td {
  padding: 12px 16px;
  font-size: 0.8rem;
  border-bottom: 1px solid rgba(255,255,255,0.03);
}
.admin-table tr:last-child td { border-bottom: none; }
.admin-table .status {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 0.6rem;
  letter-spacing: 1px;
  text-transform: uppercase;
  font-weight: 700;
}
.status.aguardando_pagamento { background: rgba(255,152,0,0.15); color: var(--warning); border: 1px solid rgba(255,152,0,0.3); }
.status.pago { background: rgba(33,150,243,0.15); color: var(--info); border: 1px solid rgba(33,150,243,0.3); }
.status.enviado { background: rgba(76,175,80,0.15); color: var(--success); border: 1px solid rgba(76,175,80,0.3); }
.status.entregue { background: rgba(76,175,80,0.15); color: var(--success); border: 1px solid rgba(76,175,80,0.3); }
.status.cancelado { background: rgba(244,67,54,0.15); color: var(--danger); border: 1px solid rgba(244,67,54,0.3); }

.admin-table .acoes {
  display: flex;
  gap: 6px;
}
.admin-table .btn-icon {
  background: none;
  border: 1px solid var(--border);
  color: var(--text2);
  width: 30px; height: 30px;
  border-radius: 6px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  font-size: 0.85rem;
}
.admin-table .btn-icon:hover { border-color: var(--gold); color: var(--gold); }

/* RESPONSIVO */
@media (max-width: 768px) {
  .admin-sidebar { width: 60px; padding: 16px 8px; }
  .admin-sidebar a span, .admin-sidebar .sair span { display: none; }
  .admin-main { margin-left: 60px; padding: 20px 16px; }
  .admin-sidebar .logo-sm { margin: 0 auto 20px; display: block; }
}
</style>
</head>
<body>

<!-- TELA DE LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <img src="../../logo2.png" class="logo" alt="ATTOS2">
    <h1>Painel <em>Admin</em></h1>
    <p>Acesso restrito</p>
    <input type="email" id="adminEmail" placeholder="Email" autocomplete="email">
    <input type="password" id="adminSenha" placeholder="Senha" autocomplete="current-password">
    <button class="btn" onclick="loginAdmin()">Entrar</button>
    <div class="erro" id="adminErro"></div>
  </div>
</div>

<!-- LAYOUT ADMIN -->
<div class="admin-layout" id="adminLayout">
  <aside class="admin-sidebar">
    <img src="../../logo2.png" class="logo-sm" alt="ATTOS2">
    <nav>
      <a href="index.html" class="active"><i class="ti ti-dashboard"></i><span>Dashboard</span></a>
      <a href="produtos.html"><i class="ti ti-shirt"></i><span>Produtos</span></a>
      <a href="pedidos.html"><i class="ti ti-package"></i><span>Pedidos</span></a>
      <a href="config.html"><i class="ti ti-settings"></i><span>Configurações</span></a>
    </nav>
    <button class="sair" onclick="logoutAdmin()"><i class="ti ti-logout"></i><span>Sair</span></button>
  </aside>

  <main class="admin-main">
    <div class="admin-header">
      <h1>Dashboard <em>Admin</em></h1>
      <div class="user-info" id="adminUserInfo">Carregando...</div>
    </div>

    <!-- CARDS -->
    <div class="dashboard-grid">
      <div class="dash-card">
        <div class="dash-icon"><i class="ti ti-shirt"></i></div>
        <div class="dash-num" id="dashProdutos">—</div>
        <div class="dash-label">Produtos</div>
      </div>
      <div class="dash-card">
        <div class="dash-icon"><i class="ti ti-package"></i></div>
        <div class="dash-num" id="dashPedidos">—</div>
        <div class="dash-label">Pedidos</div>
      </div>
      <div class="dash-card">
        <div class="dash-icon"><i class="ti ti-coin"></i></div>
        <div class="dash-num" id="dashFaturamento">—</div>
        <div class="dash-label">Faturamento (mês)</div>
      </div>
      <div class="dash-card">
        <div class="dash-icon"><i class="ti ti-users"></i></div>
        <div class="dash-num" id="dashClientes">—</div>
        <div class="dash-label">Clientes</div>
      </div>
    </div>

    <!-- ÚLTIMOS PEDIDOS -->
    <h2 style="font-size:0.8rem;letter-spacing:2px;font-weight:400;margin-bottom:16px;color:var(--text2)">Últimos Pedidos</h2>
    <div class="admin-table-wrap">
      <table class="admin-table">
        <thead>
          <tr>
            <th>Pedido</th>
            <th>Cliente</th>
            <th>Total</th>
            <th>Status</th>
            <th>Data</th>
          </tr>
        </thead>
        <tbody id="ultimosPedidos">
          <tr><td colspan="5" style="text-align:center;color:var(--text2);padding:24px">Carregando...</td></tr>
        </tbody>
      </table>
    </div>
  </main>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBVXuBi31G9pfviNGUY6uZ_1cFudKthmU0",
  authDomain: "attos2-c2644.firebaseapp.com",
  projectId: "attos2-c2644",
  storageBucket: "attos2-c2644.firebasestorage.app",
  messagingSenderId: "1021391388902",
  appId: "1:1021391388902:web:b349b39a74994569bebb27",
  measurementId: "G-WQYHW5DPBC"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

const STATUS_LABELS = {
  aguardando_pagamento: 'Aguardando Pagamento',
  pago: 'Pago',
  enviado: 'Enviado',
  entregue: 'Entregue',
  cancelado: 'Cancelado'
};

// ============================================
// LOGIN ADMIN
// ============================================
function loginAdmin() {
  const email = document.getElementById('adminEmail').value.trim();
  const senha = document.getElementById('adminSenha').value.trim();
  const erro = document.getElementById('adminErro');

  if (!email || !senha) { erro.textContent = 'Preencha email e senha.'; return; }

  auth.signInWithEmailAndPassword(email, senha)
    .then(async (cred) => {
      // Verificar se é admin (custom claim ou documento)
      const idTokenResult = await cred.user.getIdTokenResult();
      if (!idTokenResult.claims.admin) {
        // Verificar também no Firestore
        const doc = await db.collection('admins').doc(cred.user.uid).get();
        if (!doc.exists) {
          auth.signOut();
          erro.textContent = 'Acesso negado. Você não é administrador.';
          return;
        }
      }
      erro.textContent = '';
      // Registrar login na auditoria
      await registrarAuditoria(db, cred.user, 'login_admin', `Login no painel admin`);
      mostrarPainel(cred.user);
    })
    .catch(err => {
      erro.textContent = err.message === 'There is no user record corresponding to this identifier. Please try again.'
        ? 'Usuário não encontrado.'
        : err.message === 'The password is invalid or the user does not have a password. Please try again.'
        ? 'Senha incorreta.'
        : err.message;
    });
}

// ============================================
// MOSTRAR PAINEL
// ============================================
function mostrarPainel(user) {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('adminLayout').style.display = 'block';
  document.getElementById('adminUserInfo').textContent = user.email;
  carregarDashboard();
}

// ============================================
// LOGOUT
// ============================================
function logoutAdmin() {
  auth.signOut();
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('adminLayout').style.display = 'none';
}

// ============================================
// AUTH STATE
// ============================================
auth.onAuthStateChanged(async user => {
  if (user) {
    try {
      const idTokenResult = await user.getIdTokenResult();
      const doc = await db.collection('admins').doc(user.uid).get();
      if (idTokenResult.claims.admin || doc.exists) {
        mostrarPainel(user);
        return;
      }
    } catch (e) {}
    auth.signOut();
  }
});

// ============================================
// DASHBOARD
// ============================================
async function carregarDashboard() {
  try {
    // Total de produtos
    const prodSnap = await db.collection('produtos').get();
    document.getElementById('dashProdutos').textContent = prodSnap.size;

    // Total de clientes
    const clientSnap = await db.collection('clientes').get();
    document.getElementById('dashClientes').textContent = clientSnap.size;

    // Pedidos
    const pedSnap = await db.collection('pedidos').orderBy('createdAt', 'desc').get();
    document.getElementById('dashPedidos').textContent = pedSnap.size;

    // Faturamento do mês
    const inicioMes = new Date();
    inicioMes.setDate(1);
    inicioMes.setHours(0,0,0,0);
    let faturamento = 0;
    pedSnap.forEach(doc => {
      const p = doc.data();
      if (p.status === 'pago' || p.status === 'enviado' || p.status === 'entregue') {
        if (p.createdAt && p.createdAt.toDate() >= inicioMes) {
          faturamento += p.total || 0;
        }
      }
    });
    document.getElementById('dashFaturamento').textContent = `R$ ${faturamento.toFixed(2).replace('.',',')}`;

    // Últimos 5 pedidos
    const tbody = document.getElementById('ultimosPedidos');
    const recentes = pedSnap.docs.slice(0, 5);
    if (recentes.length === 0) {
      tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--text2);padding:24px">Nenhum pedido ainda.</td></tr>';
      return;
    }
    tbody.innerHTML = recentes.map(doc => {
      const p = doc.data();
      const data = p.createdAt ? p.createdAt.toDate().toLocaleDateString('pt-BR') : '';
      return `
        <tr>
          <td style="color:var(--text2);font-size:0.7rem">#${doc.id.slice(0,8)}</td>
          <td>${p.clienteNome || p.clienteEmail || '—'}</td>
          <td style="color:var(--gold)">R$ ${(p.total || 0).toFixed(2).replace('.',',')}</td>
          <td><span class="status ${p.status || 'aguardando_pagamento'}">${STATUS_LABELS[p.status] || p.status}</span></td>
          <td style="color:var(--text2);font-size:0.7rem">${data}</td>
        </tr>
      `;
    }).join('');
  } catch (err) {
    console.error('Erro dashboard:', err);
  }
}
</script>
</body>
</html>
