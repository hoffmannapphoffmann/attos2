<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATTOS2 — Carrinho</title>
<meta name="description" content="Seu carrinho de compras ATTOS2.">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<link rel="shortcut icon" href="../logo2.png">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

<style>
:root {
  --gold: #D4AF37;
  --gold2: #FFD700;
  --fire1: #FF4500;
  --fire2: #FF8C00;
  --bg: #050505;
  --card-bg: rgba(255,255,255,0.03);
  --border: rgba(212,175,55,0.15);
  --text: rgba(255,255,255,0.85);
  --text-muted: rgba(255,255,255,0.4);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: Arial, sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse at 20% 50%, rgba(212,175,55,0.03) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 50%, rgba(255,69,0,0.02) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

/* NAVBAR SIMPLES */
.cart-nav {
  position: relative;
  z-index: 10;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 32px;
  border-bottom: 1px solid var(--border);
}
.cart-nav a {
  color: var(--text);
  text-decoration: none;
  font-size: 0.75rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  transition: color 0.3s;
}
.cart-nav a:hover { color: var(--gold); }
.cart-nav .logo-sm { height: 32px; opacity: 0.8; }

/* CONTEÚDO */
.cart-content {
  position: relative;
  z-index: 1;
  flex: 1;
  max-width: 900px;
  width: 100%;
  margin: 0 auto;
  padding: 40px 20px 80px;
}

.cart-header {
  margin-bottom: 40px;
}
.cart-header h1 {
  font-size: 1.8rem;
  letter-spacing: 4px;
  font-weight: 400;
  margin-bottom: 8px;
}
.cart-header h1 em { color: var(--gold); font-style: italic; }
.cart-count {
  font-size: 0.7rem;
  letter-spacing: 2px;
  color: var(--text-muted);
  text-transform: uppercase;
}

/* ITEM DO CARRINHO */
.cart-item {
  display: grid;
  grid-template-columns: 80px 1fr auto;
  gap: 20px;
  padding: 20px 0;
  border-bottom: 1px solid var(--border);
  align-items: center;
}
.cart-item-img {
  width: 80px;
  height: 80px;
  background: linear-gradient(135deg, #2E0A4A, #4A0E17);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2rem;
}
.cart-item-info h3 {
  font-size: 0.95rem;
  letter-spacing: 1px;
  margin-bottom: 4px;
  font-weight: 400;
}
.cart-item-info .cart-item-verse {
  font-size: 0.7rem;
  color: var(--gold);
  opacity: 0.7;
}
.cart-item-info .cart-item-detail {
  font-size: 0.7rem;
  color: var(--text-muted);
  margin-top: 4px;
}
.cart-item-right {
  text-align: right;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 8px;
}
.cart-item-price {
  font-size: 1rem;
  color: var(--gold);
  letter-spacing: 1px;
}
.cart-item-qty {
  display: flex;
  align-items: center;
  gap: 8px;
}
.cart-item-qty button {
  width: 28px;
  height: 28px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text);
  cursor: pointer;
  border-radius: 4px;
  font-size: 0.9rem;
  transition: all 0.3s;
}
.cart-item-qty button:hover {
  border-color: var(--gold);
  color: var(--gold);
}
.cart-item-qty span {
  min-width: 24px;
  text-align: center;
  font-size: 0.9rem;
}
.cart-item-remove {
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 0.65rem;
  letter-spacing: 1px;
  text-transform: uppercase;
  transition: color 0.3s;
}
.cart-item-remove:hover { color: var(--fire1); }

/* RESUMO */
.cart-summary {
  margin-top: 40px;
  padding: 32px;
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 12px;
  max-width: 400px;
  margin-left: auto;
}
.summary-row {
  display: flex;
  justify-content: space-between;
  padding: 8px 0;
  font-size: 0.85rem;
  color: var(--text-muted);
}
.summary-row.total {
  border-top: 1px solid var(--border);
  margin-top: 8px;
  padding-top: 16px;
  font-size: 1.1rem;
  color: var(--gold);
  font-weight: 700;
}
.summary-row.total span:last-child {
  font-size: 1.3rem;
}
.btn-checkout {
  width: 100%;
  padding: 16px;
  margin-top: 20px;
  background: linear-gradient(135deg, var(--gold), var(--gold2));
  color: #050505;
  border: none;
  border-radius: 8px;
  font-family: Arial, sans-serif;
  font-size: 0.75rem;
  letter-spacing: 3px;
  text-transform: uppercase;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s;
}
.btn-checkout:hover {
  box-shadow: 0 0 30px rgba(212,175,55,0.3);
  transform: translateY(-1px);
}
.btn-checkout:disabled {
  opacity: 0.4;
  cursor: not-allowed;
  transform: none;
}

/* CARRINHO VAZIO */
.cart-empty {
  text-align: center;
  padding: 80px 20px;
}
.cart-empty-icon {
  font-size: 4rem;
  margin-bottom: 20px;
  opacity: 0.4;
}
.cart-empty h2 {
  font-size: 1.4rem;
  letter-spacing: 3px;
  font-weight: 400;
  margin-bottom: 12px;
}
.cart-empty p {
  color: var(--text-muted);
  font-size: 0.85rem;
  margin-bottom: 32px;
}
.btn-continue {
  display: inline-block;
  padding: 14px 36px;
  border: 1px solid var(--gold);
  color: var(--gold);
  text-decoration: none;
  font-size: 0.7rem;
  letter-spacing: 3px;
  text-transform: uppercase;
  transition: all 0.3s;
}
.btn-continue:hover {
  background: rgba(212,175,55,0.1);
  box-shadow: 0 0 20px rgba(212,175,55,0.2);
}

/* FOOTER */
.cart-footer {
  position: relative;
  z-index: 1;
  text-align: center;
  padding: 24px;
  font-size: 0.6rem;
  letter-spacing: 2px;
  color: var(--text-muted);
  text-transform: uppercase;
  border-top: 1px solid var(--border);
}

/* RESPONSIVO */
@media (max-width: 600px) {
  .cart-nav { padding: 12px 16px; }
  .cart-content { padding: 24px 16px; }
  .cart-item { grid-template-columns: 60px 1fr; gap: 12px; }
  .cart-item-right { grid-column: 1 / -1; flex-direction: row; justify-content: space-between; align-items: center; }
  .cart-item-img { width: 60px; height: 60px; font-size: 1.5rem; }
  .cart-summary { max-width: 100%; }
}
</style>
</head>
<body>

<!-- NAVBAR UNIVERSAL (inserida via js/navbar.js) -->

<div class="cart-content">
  <div class="cart-header">
    <h1>Seu <em>Carrinho</em></h1>
    <div class="cart-count" id="cartCount">0 itens</div>
  </div>

  <!-- CARRINHO VAZIO -->
  <div class="cart-empty" id="cartEmpty">
    <div class="cart-empty-icon">&#x1F6D2;</div>
    <h2>Carrinho vazio</h2>
    <p>Adicione produtos da loja para começar suas compras.</p>
    <a href="../index.html" class="btn-continue">Ver Produtos</a>
  </div>

  <!-- LISTA DE ITENS -->
  <div id="cartItems"></div>

  <!-- RESUMO -->
  <div class="cart-summary" id="cartSummary" style="display:none">
    <div class="summary-row">
      <span>Subtotal</span>
      <span id="subtotal">R$ 0,00</span>
    </div>
    <div class="summary-row">
      <span>Frete</span>
      <span id="frete">A calcular</span>
    </div>
    <div class="summary-row total">
      <span>Total</span>
      <span id="total">R$ 0,00</span>
    </div>
    <button class="btn-checkout" id="btnCheckout" onclick="finalizarCompra()">Finalizar Compra</button>
  </div>
</div>

<div class="cart-footer">ATTOS² — Vestindo a Chama do Espírito • Atos 2:4</div>

<script src="../js/carrinho.js"></script>
<script>
// ============================================
// FIREBASE
// ============================================
const firebaseConfig = {
  apiKey: "AIzaSyBVXuBi31G9pfviNGUY6uZ_1cFudKthmU0",
  authDomain: "attos2-c2644.firebaseapp.com",
  projectId: "attos2-c2644",
  storageBucket: "attos2-c2644.firebasestorage.app",
  messagingSenderId: "1021391388902",
  appId: "1:1021391388902:web:b349b39a74994569bebb27",
  measurementId: "G-WQYHW5DPBC"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// ============================================
// GERENCIAMENTO DO CARRINHO (usa módulo Carrinho)
// ============================================

function carregarCarrinho() {
  renderizar();
}

// Toast de erro
function mostrarErro(motivo) {
  var toast = document.createElement('div');
  toast.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#f44336;color:#fff;padding:12px 24px;border-radius:10px;font-size:0.85rem;z-index:99999;box-shadow:0 8px 30px rgba(244,67,54,0.3);font-family:Arial,sans-serif;text-align:center;max-width:90vw';
  toast.textContent = motivo;
  document.body.appendChild(toast);
  setTimeout(function() { toast.remove(); }, 4000);
}

async function alterarQtd(index, delta) {
  var itens = Carrinho.obter();
  if (index < 0 || index >= itens.length) return;

  var item = itens[index];

  if (delta > 0) {
    // Buscar estoque real do Firestore antes de incrementar
    try {
      var doc = await db.collection('produtos').doc(item.id).get();
      if (!doc.exists) {
        mostrarErro('Produto não encontrado no catálogo.');
        return;
      }
      var modelos = doc.data().modelos || {};
      var estoques = modelos[item.corte] || {};
      var estoqueDisponivel = estoques[item.tamanho] || 0;

      var resultado = Carrinho.alterarQuantidade(index, delta, estoqueDisponivel);
      if (!resultado.ok) {
        mostrarErro(resultado.motivo);
        return;
      }
    } catch (err) {
      console.warn('Erro ao verificar estoque:', err);
      mostrarErro('Erro ao verificar estoque. Tente novamente.');
      return;
    }
  } else {
    // Decremento não precisa verificar estoque
    Carrinho.alterarQuantidade(index, delta);
  }

  renderizar();
}

function removerItem(index) {
  Carrinho.remover(index);
  renderizar();
}

function getTotalItens() {
  return Carrinho.totalItens();
}

function getTotalPreco() {
  return Carrinho.subtotal();
}

// ============================================
// RENDERIZAR
// ============================================
function renderizar() {
  var carrinho = Carrinho.obter();
  var container = document.getElementById('cartItems');
  var empty = document.getElementById('cartEmpty');
  var summary = document.getElementById('cartSummary');
  var count = document.getElementById('cartCount');

  var totalItens = getTotalItens();
  count.textContent = totalItens + ' ' + (totalItens === 1 ? 'item' : 'itens');

  if (carrinho.length === 0) {
    empty.style.display = 'block';
    container.innerHTML = '';
    summary.style.display = 'none';
    return;
  }

  empty.style.display = 'none';
  summary.style.display = 'block';

  container.innerHTML = carrinho.map(function(item, idx) {
    return '<div class="cart-item">' +
      '<div class="cart-item-img">' + (item.imagem ? '<img src="' + item.imagem + '" style="width:100%;height:100%;object-fit:cover;border-radius:8px">' : '👕') + '</div>' +
      '<div class="cart-item-info">' +
        '<h3>' + item.nome + '</h3>' +
        (item.versiculo ? '<div class="cart-item-verse">' + item.versiculo + '</div>' : '') +
        '<div class="cart-item-detail">' + item.tamanho + ' • ' + item.corte + '</div>' +
      '</div>' +
      '<div class="cart-item-right">' +
        '<div class="cart-item-price">R$ ' + (item.preco * item.quantidade).toFixed(2).replace('.',',') + '</div>' +
        '<div class="cart-item-qty">' +
          '<button onclick="alterarQtd(' + idx + ', -1)">−</button>' +
          '<span>' + item.quantidade + '</span>' +
          '<button onclick="alterarQtd(' + idx + ', 1)">+</button>' +
        '</div>' +
        '<button class="cart-item-remove" onclick="removerItem(' + idx + ')">Remover</button>' +
      '</div>' +
    '</div>';
  }).join('');

  var subtotal = getTotalPreco();
  document.getElementById('subtotal').textContent = 'R$ ' + subtotal.toFixed(2).replace('.',',');
  document.getElementById('total').textContent = 'R$ ' + subtotal.toFixed(2).replace('.',',');
}

// ============================================
// FINALIZAR COMPRA
// ============================================
function finalizarCompra() {
  var user = auth.currentUser;
  if (!user) {
    sessionStorage.setItem('redirectPosLogin', '../pages/carrinho.html');
    window.location.href = 'login.html';
    return;
  }
  if (Carrinho.obter().length === 0) return;
  window.location.href = 'checkout.html';
}

// ============================================
// AUTH STATE
// ============================================
auth.onAuthStateChanged(function(user) {
  if (user) {
    // Tentar carregar carrinho do Firestore se o local estiver vazio
    db.collection('clientes').doc(user.uid).get().then(function(doc) {
      if (doc.exists && doc.data().carrinho && doc.data().carrinho.length > 0) {
        var local = JSON.parse(localStorage.getItem('attos2_carrinho') || '[]');
        if (local.length === 0) {
          // Restaurar carrinho do Firestore para o localStorage
          doc.data().carrinho.forEach(function(item) {
            localStorage.setItem('attos2_carrinho', JSON.stringify(doc.data().carrinho));
          });
          renderizar();
        }
      }
    }).catch(function() {});
  }
});

// ============================================
// INICIAR
// ============================================
carregarCarrinho();
</script>

    <div style="display:flex;align-items:center;gap:16px">

      <a href="admin/index.html" style="padding:6px 14px;background:rgba(212,175,55,0.1);border:1px solid rgba(212,175,55,0.2);border-radius:6px;color:#D4AF37;font-family:Arial,sans-serif;font-size:0.6rem;letter-spacing:2px;text-transform:uppercase;text-decoration:none;transition:all 0.3s;display:flex;align-items:center;gap:4px" onmouseover="this.style.background='rgba(212,175,55,0.2)'" onmouseout="this.style.background='rgba(212,175,55,0.1)'"><i class="ti ti-shield-lock"></i> Admin</a>
    </div>
  </div>
</footer>

</body>
